name: Update OUI Database

on:
  # Run on the 1st of every month at midnight UTC
  schedule:
    - cron: '0 0 1 * *'

  # Allow manual trigger
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Download latest OUI sources
        run: bash download-sources.sh

      - name: Merge databases
        run: node merge-oui-databases.js

      - name: Update counts in documentation
        run: |
          # Extract new OUI count from stats.txt
          NEW_COUNT=$(grep "Unique OUIs:" LISTS/stats.txt | grep -oE '[0-9,]+' | tr -d ',')
          NEW_COUNT_FORMATTED=$(printf "%'d" $NEW_COUNT)
          TODAY=$(date +'%Y-%m-%d')

          # URL-encode the formatted count for badge (comma -> %2C)
          BADGE_COUNT=$(echo "$NEW_COUNT_FORMATTED" | sed 's/,/%2C/g')

          echo "New OUI count: $NEW_COUNT_FORMATTED (badge: $BADGE_COUNT)"

          # Update README.md
          sed -i -E "s/OUIs-[0-9%2C]+-blue/OUIs-${BADGE_COUNT}-blue/g" README.md
          sed -i -E "s/[0-9]{2,3},[0-9]{3}\+ vendors/${NEW_COUNT_FORMATTED}+ vendors/g" README.md
          sed -i -E "s/Total Unique OUIs\*\* \| \*\*[0-9,]+/Total Unique OUIs** | **${NEW_COUNT_FORMATTED}/g" README.md
          sed -i -E "s/Total OUIs:\*\* [0-9,]+/Total OUIs:** ${NEW_COUNT_FORMATTED}/g" README.md
          sed -i -E "s/Last Updated:\*\* [0-9-]+/Last Updated:** ${TODAY}/g" README.md

          # Update QUICK-START.md
          sed -i -E "s/[0-9]{2,3},[0-9]{3} manufacturers/${NEW_COUNT_FORMATTED} manufacturers/g" QUICK-START.md
          sed -i -E "s/[0-9]{2,3},[0-9]{3} unique OUIs/${NEW_COUNT_FORMATTED} unique OUIs/g" QUICK-START.md
          sed -i -E "s/Total OUIs: [0-9,]+/Total OUIs: ${NEW_COUNT_FORMATTED}/g" QUICK-START.md
          sed -i -E "s/Unique OUIs: +[0-9,]+/Unique OUIs:        ${NEW_COUNT_FORMATTED}/g" QUICK-START.md
          sed -i -E "s/Last Updated:\*\* [0-9-]+/Last Updated:** ${TODAY}/g" QUICK-START.md

          # Update package.json description
          sed -i -E "s/[0-9]{2,3},[0-9]{3}\+ vendors/${NEW_COUNT_FORMATTED}+ vendors/g" package.json

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add LISTS/ README.md QUICK-START.md package.json
          NEW_COUNT=$(grep "Unique OUIs:" LISTS/stats.txt | grep -oE '[0-9,]+' | tr -d ',')
          git commit -m "Auto-update OUI database $(date +'%Y-%m-%d') - $NEW_COUNT OUIs"
          git push

      - name: Summary
        run: |
          echo "## OUI Database Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat LISTS/stats.txt >> $GITHUB_STEP_SUMMARY
